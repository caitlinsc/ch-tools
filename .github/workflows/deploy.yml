name: Encrypt and deploy to Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Staticrypt
        run: npm install -g staticrypt

      - name: Encrypt all HTML files
        env:
          STATICRYPT_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: |
          echo "staticrypt version: $(staticrypt --version)"
          find . -name "*.html" \
            -not -path "./.git/*" \
            -not -path "./node_modules/*" \
            | while read f; do
              echo "Encrypting $f"
              tmp=$(mktemp --suffix=.html)
              staticrypt "$f" \
                --password "$STATICRYPT_PASSWORD" \
                -o "$tmp" \
                --short \
                --template-title "Cheshire Horse Tools" \
                --template-instructions "Enter the tools password to continue." \
                --remember 1
              mv "$tmp" "$f"
            done
          echo "Done. First 5 lines of root index.html:"
          head -5 ./index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - uses: actions/deploy-pages@v4
        id: deployment
